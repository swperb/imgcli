name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build & smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build (hardened)
        run: make
      - name: Smoke test
        run: make check
      - name: Exercise every filter family + formats
        run: |
          ./imgcli -y -i testsrc=320x240 card.png
          ./imgcli --json -y -i card.png -vf "scale=160:-1,crop=120:120,grayscale,contrast=1.2,gblur=2,sharpen,edge,emboss,rotate=20,sepia" out.png
          ./imgcli --json -y -i card.png -i color=red:64x64 -vf "overlay=20:20,opacity=0.8" out.jpg
          ./imgcli --json -y -i card.png out.bmp
          ./imgcli --json -y -i card.png out.tga
          ./imgcli --json -y -i card.png out.ppm
          ./imgcli --json -y -i card.png out.qoi
          ./imgcli --json -y -i out.qoi rt.png   # QOI round-trips back through the decoder
          ./imgcli --json -info -i out.png

  sanitizers:
    name: ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build with ASan/UBSan
        run: make asan
      - name: Run battery + adversarial inputs
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          ./imgcli.asan -y -i testsrc=640x480 c.png
          ./imgcli.asan -y -i c.png -vf "scale=200:-1,crop=128:128,grayscale,gblur=3,sharpen,edge,emboss,rotate=33,convolution=0 -1 0 -1 5 -1 0 -1 0,sepia" o.png
          ./imgcli.asan -y -i c.png -i color=#00ff00aa:80x80 -vf "overlay=10:10,opacity=0.5,tint=red" o.tga
          ./imgcli.asan -y -i c.png o.qoi; ./imgcli.asan -y -i o.qoi -vf "scale=64:-1,grayscale" q.png  # QOI encode + decode
          ./imgcli.asan -y -i c.png -vf "scale=900:700:lanczos" up.png; ./imgcli.asan -y -i c.png -vf "scale=40:30:bicubic" dn.png  # HQ resamplers up + down
          mkdir -p bin && ./imgcli.asan -y -i testsrc=80x60 bin/a.png && ./imgcli.asan -y -i gradient=40x40 bin/b.png && printf 'junk' > bin/bad.png
          ./imgcli.asan --json -i "bin/*.png" --out-dir out -vf "scale=32:-1:bicubic" -f qoi -y || true   # batch: ok + per-file failure
          # stdin/stdout pipe paths (non-jpg: stb's jpeg encoder has a known benign signed-shift)
          ./imgcli.asan -i c.png -f png - | ./imgcli.asan -i - -vf "scale=99:-1,grayscale,gblur=2,rotate=20" -f qoi - > piped.qoi
          ./imgcli.asan -info -i piped.qoi
          : | ./imgcli.asan -i - x.png || true                          # empty stdin
          head -c 40 c.png | ./imgcli.asan -i - x.png || true           # truncated stdin
          # adversarial: oversize/limits, tiny frames, extreme rotate
          ./imgcli.asan -y -i "testsrc=99999x99999" x.png || true
          ./imgcli.asan -y -i c.png -vf "scale=20000:20000" x.png || true
          ./imgcli.asan -y -i "color=transparent:1x1" -vf "rotate=359.9,blur=3,scale=1:1" x.png || true
          # malformed/garbage inputs must error cleanly, not crash
          head -c 200 c.png > trunc.png; ./imgcli.asan -y -i trunc.png x.png || true
          printf 'P6 99999 99999 255 ' > bomb.ppm; ./imgcli.asan -y -i bomb.ppm x.png || true
          head -c 18 o.qoi > trunc.qoi; ./imgcli.asan -info -i trunc.qoi || true   # truncated QOI
          printf 'qoif\x7f\xff\xff\xff\x7f\xff\xff\xff\x04\x00' > bomb.qoi; ./imgcli.asan -info -i bomb.qoi || true  # QOI dim bomb
          dd if=/dev/urandom of=rand bs=1k count=4 2>/dev/null; ./imgcli.asan -y -i rand x.png || true
          echo "sanitizer battery passed"

  fuzz-smoke:
    name: fuzz (60s smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build fuzzer (clang/libFuzzer)
        run: make fuzz CC=clang
      - name: Seed corpus
        run: |
          make
          mkdir -p corpus
          ./imgcli -y -i testsrc=128x96 corpus/a.png
          ./imgcli -y -i gradient=64x64 corpus/b.bmp
          ./imgcli -y -i checker=80x80 corpus/c.tga
          ./imgcli -y -i color=blue:40x40 corpus/d.jpg
          ./imgcli -y -i checker=72x72 corpus/e.qoi   # seed the QOI decode path for the fuzzer
      - name: Run libFuzzer
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ./imgcli-fuzz -max_total_time=60 -max_len=200000 -timeout=10 corpus

  leaks:
    name: leaks (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: make
      - name: leak-check the pipeline
        run: |
          ./imgcli -y -i testsrc=320x240 c.png
          MallocStackLogging=1 leaks --atExit -- ./imgcli -y -i c.png -vf "scale=160:-1,grayscale,gblur=2,edge,rotate=20" o.png
          MallocStackLogging=1 leaks --atExit -- ./imgcli -y -i c.png -i color=red:50x50 -vf "overlay=10:10" o.jpg

  mcp-build:
    name: mcp build (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp/package-lock.json
      - name: Build the MCP server
        working-directory: mcp
        run: |
          npm ci
          npm run build
      - name: Streamable HTTP transport smoke (initialize + tools/list at /mcp)
        working-directory: mcp
        run: |
          PORT=8181 node dist/index.js & SVR=$!
          sleep 1
          H=(-H 'content-type: application/json' -H 'accept: application/json, text/event-stream')
          init=$(curl -sf "${H[@]}" -X POST localhost:8181/mcp -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}')
          echo "$init" | grep -q '"serverInfo"' || { echo "initialize failed: $init"; kill $SVR; exit 1; }
          tools=$(curl -sf "${H[@]}" -X POST localhost:8181/mcp -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "$tools" | grep -q 'convert_image' || { echo "tools/list missing tools: $tools"; kill $SVR; exit 1; }
          kill $SVR; echo "HTTP transport OK"

  docker:
    name: docker image (Smithery container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build the container image
        run: docker build -t imgcli-mcp .
      - name: HTTP smoke as Smithery runs it (PORT=8081 -> /mcp, real conversion)
        run: |
          docker run -d --name mcp -e PORT=8081 -p 8081:8081 imgcli-mcp
          for i in $(seq 1 20); do curl -sf localhost:8081/ >/dev/null && break; sleep 1; done
          H=(-H 'content-type: application/json' -H 'accept: application/json, text/event-stream')
          init=$(curl -sf "${H[@]}" -X POST localhost:8081/mcp -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}')
          echo "$init" | grep -q '"serverInfo"' || { echo "init failed: $init"; docker logs mcp; exit 1; }
          tools=$(curl -sf "${H[@]}" -X POST localhost:8081/mcp -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "$tools" | grep -q 'convert_image' || { echo "tools/list failed: $tools"; docker logs mcp; exit 1; }
          conv=$(curl -sf "${H[@]}" -X POST localhost:8081/mcp -d '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"convert_image","arguments":{"input":"testsrc=64x64","output":"/tmp/o.png"}}}')
          # imgcli's JSON is wrapped as a text string inside the tool result, so
          # parse both layers instead of grepping the escaped inner JSON.
          echo "$conv" | python3 -c "import sys,json; d=json.load(sys.stdin); t=json.loads(d['result']['content'][0]['text']); assert t['ok'] and t['format']=='png', t; print('convert ok:', t)" \
            || { echo "convert failed: $conv"; docker logs mcp; exit 1; }
          echo "Docker HTTP smoke OK"; docker rm -f mcp

  windows:
    name: windows (mingw cross-build + wine smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install mingw-w64 + wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64 wine wine64
      - name: Cross-compile imgcli.exe
        run: |
          x86_64-w64-mingw32-gcc -std=gnu11 -O2 -Wall -Wextra -Wformat -Wformat-security \
            -fstack-protector-strong -static \
            -Wno-unused-but-set-variable -Wno-deprecated-declarations \
            src/*.c -lm -o imgcli.exe
          file imgcli.exe
      - name: Smoke test under wine
        env:
          WINEDEBUG: "-all"
        run: |
          wine ./imgcli.exe --version
          wine ./imgcli.exe -y -i testsrc=64x64 -vf "scale=32:-1,grayscale" out.png
          test -f out.png && echo "windows binary runs ✓"
