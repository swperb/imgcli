version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (and re-pin on updates).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]

  # Keep the MCP server's npm dependencies patched.
  # Grouped into a single PR per cycle; patch/minor auto-merge once CI (incl.
  # the mcp-build job) is green — see .github/workflows/dependabot-automerge.yml.
  - package-ecosystem: npm
    directory: "/mcp"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      mcp-dependencies:
        patterns: ["*"]
