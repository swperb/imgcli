name: dependabot-automerge

# Auto-merge Dependabot PRs that are patch/minor once all required checks pass
# (including the mcp-build job). Major bumps are left open for manual review.
on: pull_request

# Read-only by default; the automerge job opts into the write scopes it needs
# (OpenSSF Scorecard Token-Permissions).
permissions:
  contents: read

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write        # squash-merge the PR
      pull-requests: write    # enable auto-merge
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      - name: Enable auto-merge for patch & minor updates
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
