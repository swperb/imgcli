name: codeql

# Static analysis with GitHub CodeQL (C/C++). Results surface in the repo's
# Security -> Code scanning tab. Runs on PRs, pushes to main, and weekly so new
# query packs catch issues even when the code is quiet.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"   # Mondays 03:27 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (c-cpp)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload results to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-extended
          config-file: ./.github/codeql/codeql-config.yml

      # Manual build so CodeQL traces the real hardened compile (same as CI).
      - name: Build (hardened)
        run: make

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:c-cpp"
