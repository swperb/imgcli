name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build the Windows asset for"
        required: true
        default: "v0.3.0"

# Least-privilege default: the workflow token is read-only at the top level and
# each job opts into the narrower write scope it actually needs (OpenSSF
# Scorecard Token-Permissions).
permissions:
  contents: read

env:
  REL_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # Create the release exactly once, so the parallel build jobs don't race to
  # create it (which previously failed the second job with "tag already exists").
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the GitHub release / tag
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Create release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$REL_TAG" --title "$REL_TAG" \
            --generate-notes --verify-tag || gh release view "$REL_TAG"

  build:
    needs: create-release
    if: github.event_name == 'push'
    name: build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write      # upload assets to the GitHub release
      id-token: write      # OIDC for build-provenance attestation
      attestations: write  # write the attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: imgcli-linux-x86_64
          - os: macos-latest
            asset: imgcli-macos-arm64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build (hardened)
        run: make
      - name: Smoke test
        run: make check
      - name: Package
        run: |
          mkdir -p "dist/imgcli"
          cp imgcli README.md LICENSE SECURITY.md AGENTS.md llms.txt "dist/imgcli/"
          tar -C dist -czf "${{ matrix.asset }}.tar.gz" imgcli
          shasum -a 256 "${{ matrix.asset }}.tar.gz" > "${{ matrix.asset }}.tar.gz.sha256"
      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "${{ matrix.asset }}.tar.gz" "${{ matrix.asset }}.tar.gz.sha256" --clobber

      - name: Attest tarball provenance
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-path: ${{ matrix.asset }}.tar.gz

      # Debian/Ubuntu/WSL package (linux build only). Additive — a failure here
      # does not affect the tarball already uploaded above.
      - name: Build and upload .deb
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          PKG="imgcli_${VER}_amd64"
          mkdir -p "$PKG/DEBIAN" "$PKG/usr/bin" "$PKG/usr/share/doc/imgcli"
          install -m755 imgcli "$PKG/usr/bin/imgcli"
          install -m644 README.md "$PKG/usr/share/doc/imgcli/README.md"
          install -m644 LICENSE  "$PKG/usr/share/doc/imgcli/copyright"
          cat > "$PKG/DEBIAN/control" <<EOF
          Package: imgcli
          Version: ${VER}
          Section: graphics
          Priority: optional
          Architecture: amd64
          Maintainer: swperb <swperb@users.noreply.github.com>
          Homepage: https://github.com/swperb/imgcli
          Description: ffmpeg-style image conversion & processing CLI
           A tiny, dependency-free command-line tool to convert, resize, crop,
           filter and composite images via an ffmpeg-style filtergraph.
          EOF
          dpkg-deb --build --root-owner-group "$PKG"
          gh release upload "$GITHUB_REF_NAME" "${PKG}.deb" --clobber
          echo "DEB_FILE=${PKG}.deb" >> "$GITHUB_ENV"

      - name: Attest .deb provenance
        if: matrix.os == 'ubuntu-latest'
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-path: ${{ env.DEB_FILE }}

  # Publish the imgcli CLI image to the GitHub Container Registry.
  # First push creates a private package — make it public once in the repo's
  # Packages settings. Uses GITHUB_TOKEN; no external account needed.
  docker:
    needs: create-release
    if: github.event_name == 'push'
    name: docker image (ghcr.io)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push
        run: |
          VER="${GITHUB_REF_NAME#v}"
          IMG="ghcr.io/${{ github.repository_owner }}/imgcli"
          docker build -f docker/imgcli.Dockerfile -t "$IMG:$VER" -t "$IMG:latest" .
          docker push "$IMG:$VER"
          docker push "$IMG:latest"

  # Windows binary, cross-compiled with mingw-w64 (validated under wine in CI).
  # Runs on tag push, and via workflow_dispatch to attach the .exe to an existing
  # release (e.g. v0.3.0) without cutting a new tag.
  build-windows:
    needs: create-release
    name: build imgcli-windows-x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: write      # upload assets to the GitHub release
      id-token: write      # OIDC for build-provenance attestation
      attestations: write  # write the attestation
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-mingw-w64-x86-64 zip
      - name: Cross-compile imgcli.exe
        run: |
          x86_64-w64-mingw32-gcc -std=gnu11 -O2 -Wall -Wextra -Wformat -Wformat-security \
            -fstack-protector-strong -static \
            -Wno-unused-but-set-variable -Wno-deprecated-declarations \
            src/*.c -lm -o imgcli.exe
      - name: Package
        run: |
          mkdir -p "dist/imgcli"
          cp imgcli.exe README.md LICENSE SECURITY.md AGENTS.md llms.txt "dist/imgcli/"
          (cd dist && zip -r ../imgcli-windows-x86_64.zip imgcli)
          shasum -a 256 imgcli-windows-x86_64.zip > imgcli-windows-x86_64.zip.sha256
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$REL_TAG" \
            imgcli-windows-x86_64.zip imgcli-windows-x86_64.zip.sha256 --clobber

      - name: Attest provenance
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-path: imgcli-windows-x86_64.zip
